<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" 
          content="zoek gemakelijk naar artiesten of nummers ">

    <meta name="keywords" 
          content="Spotify trends, trending muziek, 
                   populaire nummers, top artiesten, muziek trends, 
                   Spotify charts, top nummers, genres, muziek 
                   website, Bootstrap project">

    <meta name="author" content="David Tragter">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css link -->
    <link rel="stylesheet" href="../css/style.css">

    <title>zoeken... || Spotify Trends</title>
</head>

<body class="bg-dark text-light page-load">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top fs-4">
            <div class="container">

                <a class="navbar-brand fs-2 fw-bold" href="/pages/index.html">
                    <i class="fab fa-spotify me-2"></i>Spotify Trends
                </a>

                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                        aria-controls="navbarNav"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="/pages/index.html">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="/pages/top-nummers.html">
                                top-nummers
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="/pages/top-artiesten.html">
                                top-artiesten
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active active-page" href="/pages/zoeken.html">
                                zoeken
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <main class="mt-5">
        <section>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        
                        <h1 class="text-center text-light mb-4 fw-bold">Zoek naar een nummer</h1>

                        <form class="d-flex" onsubmit="event.preventDefault();"> 
                            <div class="input-group input-group-lg">
                                
                                <input type="text" 
                                    class="form-control bg-secondary text-light border-0 rounded-start-pill ps-4" 
                                    id="zoekInput" 
                                    placeholder="Titel of artiest..." 
                                    aria-label="Zoek naar een nummer" 
                                    required>
                                
                                <button class="btn btn-primary rounded-end-pill px-4 search-btn" type="button" id="zoekKnop">
                                    <i class="fas fa-search"></i> Zoek
                                </button>

                            </div>
                        </form>

                        <div id="zoekResultaten" class="row mt-5 justify-content-center"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>




    <!-- Bootstrap 5 js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--main js script-->
    <script src="../js/main.js"></script>
