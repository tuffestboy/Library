<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" 
          content="Ontdek de populairste kerstmuziek van 2025! Bekijk de top 10 trending kerstnummers in 
                   Nederland, gebaseerd op Spotify data. Speel ze direct af.">

    <meta name="keywords" 
          content="Spotify trends, trending muziek, 
                   populaire nummers, top artiesten, muziek trends, 
                   Spotify charts, top nummers, genres, muziek 
                   website, Bootstrap project">

    <meta name="author" content="David Tragter">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Top 10 Kerstnummers 2025 || Spotify Trends</title>
</head>

<style>
    .loading{
        background-color: #0000FF;
        height: 110px;
        width: 110px;
        border: solid darkblue 3px;
        border-radius: 20px;
        will-change: transform;
        animation: loader 6s infinite ease-in-out;
    }

    .loading p{
        font-size: 1.1em;
        font-weight: bold;
        margin: 0;
        will-change: transform;
        animation: loaderP 6s infinite ease-in-out;
    }

    @keyframes loader {
        0%{transform  :  rotate(0deg)  ;  background-color: #121212; color: #1DB954; border-radius: 20px;}
        25%{transform :  rotate(90deg) ;  background-color: #0A1A2F; color: #1DB954; border-radius: 30px;}
        50%{transform :  rotate(180deg);  background-color: #121212; color: #3DDC84; border-radius: 40px;}
        75%{transform :  rotate(270deg);  background-color: #0D2B45; color: #1ED760; border-radius: 50px;}
        100%{transform:  rotate(360deg);  background-color: #121212; color: #1DB954; border-radius: 20px;}
    }

    @keyframes loaderP{
        0%{transform  :  rotate(0deg)   ; }
        25%{transform :  rotate(-90deg) ; }
        50%{transform :  rotate(-180deg); }
        75%{transform :  rotate(-270deg); }
        100%{transform:  rotate(-360deg); }
    }
</style>

<body class="bg-dark text-light page-load">


    <section>
        <div class="w-100 vh-100 justify-content-center align-items-center d-flex">
            <div class="loading d-flex justify-content-center align-items-center"><p>Loading...</p></div>
        </div>
    </section>

    <!-- Bootstrap 5 js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--main js script-->
    <script src="../js/main.js"></script>
</body>
</html>
