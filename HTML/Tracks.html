<!DOCTYPE html>
<html lang="nl" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Library – jouw persoonlijke muziekoverzicht met tracks, artiesten en genres.">
    <title>Tracks</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body data-page="Tracks">
    <header>
        <nav class="navbar navbar-expand">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="https://cdn.simpleicons.org/librariesdotio/000000" alt="logo" width="80" height="80"
                        class="logo">
                    <span class="site-name">LIBRARY</span>
                </a>
                <div class="nav-underline ms-auto" id="nav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="Tracks.html">Tracks</a></li>
                        <li class="nav-item"><a class="nav-link" href="Artists.html">Artists</a></li>
                        <li class="nav-item"><a class="nav-link" href="genres.html">Genres</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container-xxl">
        <section>
            <div class="input-group mt-5">
                <button class="btn btn-secondary dropdown-toggle fs-2" type="button" id="filter-btn"
                    data-bs-toggle="dropdown">
                    Filter: Track
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" data-filter="Track">Track</a></li>
                    <li><a class="dropdown-item" href="#" data-filter="Artist">Artist</a></li>
                    <li><a class="dropdown-item" href="#" data-filter="Genre">Genre</a></li>
                </ul>
                <input type="text" class="search-tab fs-1 fw-bolder" id="search-tab">
                <button class="btn btn-secondary dropdown-toggle fs-2" type="button" id="sort-btn" data-bs-toggle="dropdown">
                    Sort by
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" data-sort="az">A → Z</a></li>
                    <li><a class="dropdown-item" href="#" data-sort="za">Z → A</a></li>
                </ul>
            </div>
        </section>
        <section>
            <div class="splitter my-5 border bg-secondary shadow-lg border-black rounded rounded-5"></div>
        </section>
        <section>
            <div id="tracks-table"
                class="row my-5 bg-light-subtle border rounded-5 px-2 shadow-lg row-cols-md-3 row-cols-lg-6 g-3">
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/main.js"></script>

</body>

</html>
